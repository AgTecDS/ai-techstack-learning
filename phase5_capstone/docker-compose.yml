version: "3.9"

# ── Networks ───────────────────────────────────────────────────────────────────
# All services share the 'ai-net' bridge network.
# Services can reach each other by their service name (e.g., http://qdrant:6333).

networks:
  ai-net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
# Named volumes persist data across docker compose down/up cycles.

volumes:
  qdrant_data:
  minio_data:

# ── Services ───────────────────────────────────────────────────────────────────

services:

  # ── Qdrant vector database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO object storage ───────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Streamlit app ──────────────────────────────────────────────────────────
  streamlit:
    build:
      context: ..           # build context is project root
      dockerfile: phase5_capstone/Dockerfile.streamlit
    container_name: streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      ONNX_MODEL_PATH: /app/models/mnist_cnn.onnx
      QDRANT_HOST:     qdrant
      QDRANT_PORT:     "6333"
      S3_ENDPOINT:     http://minio:9000
      S3_KEY:          minio
      S3_SECRET:       minio123
    volumes:
      # Mount your trained ONNX model into the container
      - ../phase3_edge_ai/mnist_cnn.onnx:/app/models/mnist_cnn.onnx:ro
    depends_on:
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
